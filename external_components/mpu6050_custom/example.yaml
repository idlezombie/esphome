external_components:
  - source: ./external_components/mpu6050_custom

sensor:
  - platform: custom
    lambda: |-
      auto mpu = new MPU6050Custom();
      id(mpu6050) = mpu;
      App.register_component(mpu);
      return {
        mpu->accel_x, mpu->accel_y, mpu->accel_z,
        mpu->gyro_x, mpu->gyro_y, mpu->gyro_z,
        mpu->temperature,
        mpu->angle_x, mpu->angle_y
      };
    sensors:
      - name: "MPU6050 Accel X"
      - name: "MPU6050 Accel Y"
      - name: "MPU6050 Accel Z"
      - name: "MPU6050 Gyro X"
      - name: "MPU6050 Gyro Y"
      - name: "MPU6050 Gyro Z"
      - name: "MPU6050 Temperature"
      - name: "MPU6050 Angle X"
      - name: "MPU6050 Angle Y"

button:
  - platform: template
    name: "MPU6050 Recalibrate"
    on_press:
      then:
        - lambda: |-
            id(mpu6050)->do_recalibrate();